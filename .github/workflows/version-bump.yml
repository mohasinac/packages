name: Version Bump

# Bump the version in ALL 47 package.json files atomically,
# commit, push, and create a git tag — which then triggers publish.yml.
#
# Usage (GitHub UI → Actions → Version Bump → Run workflow):
#   bump_type: patch | minor | major
#   custom_version: leave blank to auto-increment, or supply "1.2.3"

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Semver bump type (ignored when custom_version is set)"
        required: false
        type: choice
        options: [patch, minor, major]
        default: patch
      custom_version:
        description: "Set an exact version (e.g. 1.0.0).  Overrides bump_type."
        required: false
        default: ""

jobs:
  bump:
    name: Bump version + tag
    runs-on: ubuntu-latest

    permissions:
      contents: write   # push commit + tag

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a PAT so the pushed commit/tag triggers downstream workflows
          # (GITHUB_TOKEN pushes are not re-processed by other workflows by default)
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Compute new version
        id: version
        run: |
          if [ -n "${{ inputs.custom_version }}" ]; then
            NEW_VERSION="${{ inputs.custom_version }}"
          else
            # Read current version from root package.json
            CURRENT=$(node -p "require('./packages/contracts/package.json').version")
            echo "Current version: $CURRENT"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case "${{ inputs.bump_type }}" in
              major) NEW_VERSION="$((MAJOR+1)).0.0" ;;
              minor) NEW_VERSION="${MAJOR}.$((MINOR+1)).0" ;;
              patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
            esac
          fi
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Bump version in all package.json files
        run: node scripts/bump-version.mjs ${{ steps.version.outputs.new_version }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit + tag
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          git add packages/*/package.json
          git commit -m "chore: bump all packages to v${VERSION}"
          git tag "v${VERSION}"
          git push origin main --follow-tags
