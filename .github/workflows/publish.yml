name: Publish to npm

# Trigger: push a semver tag, e.g.  git tag v0.2.0 && git push --tags
# All 46 packages are published at the same version.
# Packages already at that version are skipped automatically.
on:
  push:
    tags:
      - "v*.*.*"

# Allow one publish run at a time
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Build & Publish all @mohasinac/* packages
    runs-on: ubuntu-latest

    permissions:
      contents: read  # checkout only — no write needed

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node with npm auth ─────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      # ── 3. Install root devDeps (tsup, typescript, @types/*) ─────────────
      - name: Install root dependencies
        run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── 4. Build all packages ─────────────────────────────────────────────
      - name: Build all packages
        run: node scripts/build-all.mjs

      # ── 5. Publish — skip already-published versions ──────────────────────
      - name: Publish all packages
        run: node scripts/publish-all.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── 6. Create GitHub Release ──────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          body: |
            ## @mohasinac/* ${{ github.ref_name }}

            All 46 packages published to npm at version `${{ github.ref_name }}`.

            ```
            npm install @mohasinac/contracts@${{ github.ref_name }}
            ```

            See [CHANGELOG.md](CHANGELOG.md) for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
